# =============================================================================
# docker-compose pour faire tourner le projet en self-hosted local.
#
# Modes :
#   - défaut : `docker compose up` -> postgres + app-dev + MCP
#   - prod   : `docker compose --profile prod up` -> postgres + app-prod + MCP
#
# Le service mcp-openmetadata est toujours lancé (profil par défaut).
# Adapte les variables d'env dans .env (cf. .env.example).
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Postgres : remplace Supabase Cloud
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: tati-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tati}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tati_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-tati}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tati} -d ${POSTGRES_DB:-tati}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ---------------------------------------------------------------------------
  # App TanStack Start - mode DEV (hot reload)
  # ---------------------------------------------------------------------------
  app-dev:
    build:
      context: .
      target: dev
    container_name: tati-app-dev
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-tati}:${POSTGRES_PASSWORD:-tati_dev_password}@postgres:5432/${POSTGRES_DB:-tati}
      NODE_ENV: development
    ports:
      - "5173:8080"
    volumes:
      - ./:/app
      - /app/node_modules
    command: ["bun", "run", "dev", "--host", "0.0.0.0"]

  # ---------------------------------------------------------------------------
  # App TanStack Start - mode PROD (build + preview SSR)
  # ---------------------------------------------------------------------------
  app-prod:
    build:
      context: .
      target: prod
    container_name: tati-app-prod
    profiles: ["prod"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-tati}:${POSTGRES_PASSWORD:-tati_dev_password}@postgres:5432/${POSTGRES_DB:-tati}
      NODE_ENV: production
    ports:
      - "3000:3000"

  # ---------------------------------------------------------------------------
  # Pont MCP -> OpenMetadata (toujours lancé)
  # Suppose que tu as un dossier ./mcp-openmetadata/ avec son Dockerfile + server.py
  # ---------------------------------------------------------------------------
  mcp-openmetadata:
    build:
      context: ./mcp-openmetadata
    container_name: mcp-openmetadata
    restart: unless-stopped
    environment:
      OPENMETADATA_URL: ${OPENMETADATA_URL}
      OPENMETADATA_JWT: ${OPENMETADATA_JWT}
    ports:
      - "8001:8001"

  # ---------------------------------------------------------------------------
  # Pont MCP -> PostgreSQL (toujours lancé)
  # Expose un endpoint Streamable HTTP utilisable dans TaTi:
  #   http://localhost:${MCP_POSTGRES_PORT:-8002}/mcp
  # ---------------------------------------------------------------------------
  mcp-postgres:
    build:
      context: ./mcp-postgres
    container_name: mcp-postgres
    restart: unless-stopped
    environment:
      DATABASE_URL: ${MCP_POSTGRES_DATABASE_URL:-postgres://${POSTGRES_USER:-tati}:${POSTGRES_PASSWORD:-tati_dev_password}@postgres:5432/${POSTGRES_DB:-tati}}
      MCP_POSTGRES_READ_ONLY: ${MCP_POSTGRES_READ_ONLY:-true}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${MCP_POSTGRES_PORT:-8002}:8002"

  # ---------------------------------------------------------------------------
  # Pont MCP -> PDF (toujours lancé)
  # Expose un endpoint Streamable HTTP utilisable dans TaTi:
  #   http://mcp-pdf:8003/mcp
  # Et des fichiers téléchargeables:
  #   http://localhost:${MCP_PDF_PORT:-8003}/files/<nom>.pdf
  # ---------------------------------------------------------------------------
  mcp-pdf:
    build:
      context: ./mcp-pdf
    container_name: mcp-pdf
    restart: unless-stopped
    environment:
      PDF_OUTPUT_DIR: /app/output
      PDF_PUBLIC_BASE_URL: ${MCP_PDF_PUBLIC_BASE_URL:-http://localhost:8003}
    ports:
      - "${MCP_PDF_PORT:-8003}:8003"

  # ---------------------------------------------------------------------------
  # MCP Notion (serveur officiel)
  # ---------------------------------------------------------------------------
  mcp-notion:
    image: mcp/notion:latest
    container_name: mcp-notion
    restart: unless-stopped
    environment:
      NOTION_TOKEN: ${MCP_NOTION_TOKEN}
    command:
      - --transport
      - http
      - --port
      - "8004"
      - --disable-auth
    ports:
      - "${MCP_NOTION_PORT:-8004}:8004"

  # ---------------------------------------------------------------------------
  # MCP Slack (bridge local HTTP pour TaTi)
  # ---------------------------------------------------------------------------
  mcp-slack:
    build:
      context: ./mcp-slack
    container_name: mcp-slack
    restart: unless-stopped
    environment:
      SLACK_BOT_TOKEN: ${MCP_SLACK_BOT_TOKEN}
      SLACK_TEAM_ID: ${MCP_SLACK_TEAM_ID}
      SLACK_CHANNEL_IDS: ${MCP_SLACK_CHANNEL_IDS:-}
    ports:
      - "${MCP_SLACK_PORT:-8006}:8006"

  # ---------------------------------------------------------------------------
  # MCP Discord (bridge local HTTP pour TaTi)
  # ---------------------------------------------------------------------------
  mcp-discord:
    build:
      context: ./mcp-discord
    container_name: mcp-discord
    restart: unless-stopped
    environment:
      DISCORD_BOT_TOKEN: ${MCP_DISCORD_BOT_TOKEN}
      DISCORD_GUILD_ID: ${MCP_DISCORD_GUILD_ID}
      DISCORD_CHANNEL_IDS: ${MCP_DISCORD_CHANNEL_IDS:-}
    ports:
      - "${MCP_DISCORD_PORT:-8010}:8010"

  # ---------------------------------------------------------------------------
  # MCP Filesystem (bridge local HTTP, limite a FILESYSTEM_ROOT)
  # ---------------------------------------------------------------------------
  mcp-filesystem:
    build:
      context: ./mcp-filesystem
    container_name: mcp-filesystem
    restart: unless-stopped
    environment:
      FILESYSTEM_ROOT: ${MCP_FILESYSTEM_ROOT:-/workspace}
    volumes:
      - ./:/workspace
    ports:
      - "${MCP_FILESYSTEM_PORT:-8011}:8011"

  # ---------------------------------------------------------------------------
  # MCP AWS (bridge local HTTP, principalement read-only ops/debug)
  # ---------------------------------------------------------------------------
  mcp-aws:
    build:
      context: ./mcp-aws
    container_name: mcp-aws
    restart: unless-stopped
    environment:
      AWS_REGION: ${AWS_REGION:-eu-west-3}
      AWS_PROFILE: ${AWS_PROFILE:-}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN:-}
    ports:
      - "${MCP_AWS_PORT:-8012}:8012"

  # ---------------------------------------------------------------------------
  # MCP Azure (bridge local HTTP, principalement read-only ops/debug)
  # ---------------------------------------------------------------------------
  mcp-azure:
    build:
      context: ./mcp-azure
    container_name: mcp-azure
    restart: unless-stopped
    environment:
      AZURE_SUBSCRIPTION_ID: ${AZURE_SUBSCRIPTION_ID:-}
      AZURE_TENANT_ID: ${AZURE_TENANT_ID:-}
      AZURE_CLIENT_ID: ${AZURE_CLIENT_ID:-}
      AZURE_CLIENT_SECRET: ${AZURE_CLIENT_SECRET:-}
      AZURE_ACCESS_TOKEN: ${AZURE_ACCESS_TOKEN:-}
    ports:
      - "${MCP_AZURE_PORT:-8013}:8013"

  # ---------------------------------------------------------------------------
  # MCP GitHub (optionnel)
  # ---------------------------------------------------------------------------
  mcp-github:
    build:
      context: ./mcp-github
    container_name: mcp-github
    restart: unless-stopped
    environment:
      GITHUB_TOKEN: ${MCP_GITHUB_TOKEN:-}
    ports:
      - "${MCP_GITHUB_PORT:-8007}:8007"

  # ---------------------------------------------------------------------------
  # MCP GitLab (optionnel)
  # ---------------------------------------------------------------------------
  mcp-gitlab:
    build:
      context: ./mcp-gitlab
    container_name: mcp-gitlab
    restart: unless-stopped
    environment:
      GITLAB_TOKEN: ${MCP_GITLAB_TOKEN:-}
      GITLAB_URL: ${MCP_GITLAB_URL:-https://gitlab.com}
    ports:
      - "${MCP_GITLAB_PORT:-8008}:8008"

  # ---------------------------------------------------------------------------
  # MCP Elasticsearch (deprecated upstream, mais fonctionnel)
  # Source: docker.elastic.co/mcp/elasticsearch
  # ---------------------------------------------------------------------------
  mcp-elasticsearch:
    image: ${MCP_ELASTICSEARCH_IMAGE:-docker.elastic.co/mcp/elasticsearch}
    container_name: mcp-elasticsearch
    restart: unless-stopped
    environment:
      ES_URL: ${MCP_ELASTICSEARCH_URL:-}
      ES_API_KEY: ${MCP_ELASTICSEARCH_API_KEY:-}
      ES_USERNAME: ${MCP_ELASTICSEARCH_USERNAME:-}
      ES_PASSWORD: ${MCP_ELASTICSEARCH_PASSWORD:-}
      ES_SSL_SKIP_VERIFY: ${MCP_ELASTICSEARCH_SSL_SKIP_VERIFY:-false}
    command: ["http"]
    ports:
      - "${MCP_ELASTICSEARCH_PORT:-8009}:8080"

volumes:
  postgres_data:
