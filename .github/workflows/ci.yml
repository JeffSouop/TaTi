name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, labeled]
    branches: ["main"]
  push:
    branches: ["main"]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'pull_request' || !github.event.pull_request.draft }}
    outputs:
      app: ${{ github.event_name == 'push' && 'true' || steps.filter.outputs.app }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Detect relevant app changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            app:
              - '.github/workflows/ci.yml'
              - 'package.json'
              - 'package-lock.json'
              - 'tsconfig.json'
              - 'eslint.config.js'
              - '.prettierrc'
              - '.prettierignore'
              - 'vite.config.ts'
              - 'src/**'

  quality:
    name: Quality Gate
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs.app == 'true' }}
    timeout-minutes: 20

    steps:
      - name: Require safe-to-test label for fork PRs
        if: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository && !contains(github.event.pull_request.labels.*.name, 'safe to test') }}
        run: |
          echo "This workflow requires the 'safe to test' label for fork pull requests."
          exit 1

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v45
        with:
          files: |
            **/*.{js,jsx,ts,tsx,json,md,yml,yaml}
          files_ignore: |
            coverage/**
            test-results/**
            playwright-report/**
            dist/**
            .output/**
            .vinxi/**

      - name: Lint changed files
        if: steps.changed-files.outputs.any_changed == 'true'
        run: |
          npx eslint ${{ steps.changed-files.outputs.all_modified_files }}

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests with coverage
        run: npm run test:coverage

      - name: Prettier check changed files
        if: steps.changed-files.outputs.any_changed == 'true'
        run: |
          npx prettier --check ${{ steps.changed-files.outputs.all_modified_files }}

      - name: Build
        run: npm run build

      - name: Upload coverage report
        if: ${{ always() && hashFiles('coverage/**') != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/

      - name: Upload dist on failure
        if: ${{ failure() && hashFiles('dist/**') != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: build-dist
          path: dist/

  quality-status:
    name: quality-status
    runs-on: ubuntu-latest
    needs: [changes, quality]
    if: ${{ always() }}
    steps:
      - name: Fail only if quality job failed unexpectedly
        run: |
          if [ "${{ needs.changes.result }}" = "failure" ] || [ "${{ needs.changes.result }}" = "cancelled" ]; then
            echo "Changes detection failed or was cancelled."
            exit 1
          fi
          if [ "${{ needs.changes.outputs.app }}" = "true" ] && { [ "${{ needs.quality.result }}" = "failure" ] || [ "${{ needs.quality.result }}" = "cancelled" ]; }; then
            echo "Quality checks failed or were cancelled."
            exit 1
          fi
          echo "Quality status gate passed."
