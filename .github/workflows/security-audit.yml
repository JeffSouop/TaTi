name: Security Audit

on:
  schedule:
    - cron: "0 5 * * 1"
  workflow_dispatch:
  push:
    branches: ["main"]
    paths:
      - "package.json"
      - "package-lock.json"

permissions:
  contents: read

jobs:
  npm-audit:
    name: NPM Audit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit (high+critical)
        run: npm audit --audit-level=high
